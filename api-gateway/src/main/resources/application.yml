server:
  port: 8000

spring:
  application:
    name: api-gateway
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  signerKey: z8p4p8X9vY2bN5mR7qW1eT4uI0oP3aS6dF9gH2jK5lZ8x

  cloud:
    gateway:
      routes:
        # Identity Service Routes
        - id: identity-service
          uri: lb://identity-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/users/**, /api/v1/roles/**, /api/v1/permissions/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}

        # Book Service Routes
        - id: book-service
          uri: lb://book-service
          predicates:
            - Path=/api/v1/books/**, /api/v1/categories/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}

        # Order Service Routes
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/api/v1/orders/**
          filters:
            - RewritePath=/api/v1/(?<segment>.*), /$\{segment}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [%X{service:-}, %X{traceId:-}] %logger{36} - %msg%n"
