version: '3.8'

services:
  # Dịch vụ Cơ sở dữ liệu PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: bookstore-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: testing
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  # Dịch vụ Quản trị Giao diện pgAdmin
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: bookstore-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: always

  # Dịch vụ Cache Redis
  redis:
    image: redis:7-alpine
    container_name: bookstore-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

# Khai báo phân vùng lưu trữ dữ liệu lâu dài
volumes:
  postgres_data:
  redis_data:
  kafka_data:

  # Dịch vụ Apache Kafka (chạy chế độ KRaft, không cần Zookeeper)
  kafka:
    image: bitnami/kafka:latest
    container_name: bookstore-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka_data:/bitnami/kafka
    restart: always