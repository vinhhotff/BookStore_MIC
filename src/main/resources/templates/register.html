<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký - Thư Viện Số</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .register-card {
            border: none;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }
        .register-header {
            background-color: #1e1e2f;
            color: white;
            padding: 2rem 2rem;
            text-align: center;
        }
        .form-control-custom {
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            transition: all 0.2s;
        }
        .form-control-custom:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            outline: none;
        }
        .btn-register {
            background-color: #4f46e5;
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.8rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s;
        }
        .btn-register:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
        }
        .btn-link-custom {
            color: #64748b;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }
        .btn-link-custom:hover {
            color: #4f46e5;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <!-- Card Header -->
        <div class="register-header">
            <i class="bi bi-person-plus display-4 text-primary mb-2"></i>
            <h3 class="fw-bold mb-1">Đăng Ký Tài Khoản</h3>
            <p class="text-white-50 mb-0">Tạo tài khoản để tham gia Thư Viện Số</p>
        </div>

        <!-- Card Body -->
        <div class="card-body p-4 p-md-5">
            
            <!-- Alert Lỗi Đăng Ký -->
            <div class="alert alert-danger border-0 rounded-4 py-3 mb-4 d-flex align-items-center" role="alert" th:if="${errorMessage}">
                <i class="bi bi-exclamation-triangle-fill fs-5 me-2"></i>
                <div class="small" th:text="${errorMessage}">Đăng ký thất bại!</div>
            </div>

            <!-- Form Đăng ký -->
            <form th:action="@{/register}" method="POST">
                
                <div class="row">
                    <!-- Họ -->
                    <div class="col-md-6 mb-3">
                        <label for="firstName" class="form-label fw-semibold text-secondary">Họ</label>
                        <input type="text" id="firstName" name="firstName" th:value="${firstName}"
                               class="form-control form-control-custom" placeholder="Nguyễn" required>
                    </div>
                    <!-- Tên -->
                    <div class="col-md-6 mb-3">
                        <label for="lastName" class="form-label fw-semibold text-secondary">Tên</label>
                        <input type="text" id="lastName" name="lastName" th:value="${lastName}"
                               class="form-control form-control-custom" placeholder="Văn A" required>
                    </div>
                </div>

                <!-- Tài khoản -->
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold text-secondary">Tên Đăng Nhập</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 rounded-start-3" style="border: 1.5px solid #e2e8f0;">
                            <i class="bi bi-person text-muted"></i>
                        </span>
                        <input type="text" id="username" name="username" th:value="${username}"
                               class="form-control form-control-custom border-start-0 rounded-end-3" 
                               placeholder="Tối thiểu 3 ký tự" required>
                    </div>
                </div>

                <!-- Mật khẩu -->
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold text-secondary">Mật Khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 rounded-start-3" style="border: 1.5px solid #e2e8f0;">
                            <i class="bi bi-shield-lock text-muted"></i>
                        </span>
                        <input type="password" id="password" name="password" 
                               class="form-control form-control-custom border-start-0 rounded-end-3" 
                               placeholder="Tối thiểu 8 ký tự" required>
                    </div>
                </div>

                <!-- Nút Đăng ký -->
                <button type="submit" class="btn btn-register mb-3">
                    Đăng Ký Tài Khoản <i class="bi bi-person-plus-fill ms-2"></i>
                </button>

                <!-- Liên kết quay lại Login -->
                <div class="text-center mt-3">
                    <a href="/login" class="btn-link-custom d-inline-flex align-items-center small">
                        Đã có tài khoản? Đăng nhập ngay
                    </a>
                </div>
                
            </form>
        </div>
    </div>

</body>
</html>
